<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房間</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container room-screen">
    <header class="room-header">
      <div class="room-info">
        <h2>房間 <span id="room-id-display"></span></h2>
        <button id="btn-copy" class="btn btn-small" title="複製連結">📋 複製連結</button>
      </div>
      <a href="/" class="btn btn-small btn-back">← 返回</a>
    </header>

    <div class="color-picker">
      <span class="label">選擇顏色：</span>
      <button class="color-btn" data-color="red" style="--c: #e74c3c">101</button>
      <button class="color-btn" data-color="blue" style="--c: #3498db">102</button>
      <button class="color-btn" data-color="green" style="--c: #2ecc71">103</button>
      <button class="color-btn" data-color="yellow" style="--c: #f1c40f">104</button>
    </div>

    <div class="my-sequence" id="my-sequence"></div>

    <div class="player-list" id="player-list"></div>

    <div class="board-wrapper">
      <table class="board" id="board">
        <tbody id="board-body"></tbody>
      </table>
    </div>

    <button id="btn-clear" class="btn btn-clear" disabled>清除我的顏色</button>
    <button id="btn-pip" class="btn btn-small" style="margin-top:10px;width:100%;display:none">子母畫面模式</button>
    <button id="btn-reset-board" class="btn btn-clear" style="margin-top:10px;background:#c0392b;color:#fff;display:none">重置整個棋盤</button>

    <canvas id="pip-canvas" width="320" height="480" style="display:none"></canvas>
    <video id="pip-video" muted playsinline style="display:none"></video>

    <div id="connection-status" class="connection-status" hidden>連線中斷，嘗試重新連線...</div>
  </div>

  <!-- Tutorial Modal -->
  <div id="tutorial-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3 class="modal-title">遊戲說明</h3>
      <ul class="tutorial-list">
        <li>選擇一個顏色（101 / 102 / 103 / 104）作為你的標記。</li>
        <li>點擊棋盤格子來標記你的顏色。</li>
        <li>點擊<strong>已標記的自己格子兩次</strong>可以取消標記（第一次會亮起提示）。</li>
        <li>每列每種顏色只能出現一次。</li>
        <li>當一列已有 3 種不同顏色時，第 4 格會自動填入剩餘顏色。</li>
        <li>「清除我的顏色」按鈕可一次清除所有自己的格子。</li>
      </ul>
      <label class="tutorial-skip-label">
        <input type="checkbox" id="tutorial-skip-cb"> 下次不再顯示
      </label>
      <button class="btn btn-primary" onclick="closeTutorial()">知道了</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
